<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algorithm Sorter Visualizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Sorting Algorithm Visualizer</h1>
        
        <div class="controls">
            <div class="control-group">
                <label for="arraySize">Array Size: <span id="sizeValue">50</span></label>
                <input type="range" id="arraySize" min="5" max="100" value="50">
            </div>
            
            <div class="control-group">
                <label for="speed">Speed: <span id="speedValue">50</span></label>
                <input type="range" id="speed" min="1" max="100" value="50">
            </div>
            
            <div class="control-group">
                <label for="algorithm">Algorithm:</label>
                <select id="algorithm">
                    <option value="bubble">Bubble Sort</option>
                    <option value="quick">Quick Sort</option>
                    <option value="merge">Merge Sort</option>
                    <option value="insertion">Insertion Sort</option>
                    <option value="selection">Selection Sort</option>
                    <option value="heap">Heap Sort</option>
                    <option value="counting">Counting Sort</option>
                    <option value="radix">Radix Sort</option>
                </select>
            </div>
            
            <div class="button-group">
                <button id="generateBtn">Generate Array</button>
                <button id="sortBtn">Start Sort</button>
            </div>
        </div>
        
        <div class="visualization">
            <div id="arrayContainer"></div>
        </div>
        
        <div class="info">
            <p id="algorithmInfo">Select an algorithm and click "Generate Array" to begin</p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
