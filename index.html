<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algorithm Sorter Visualizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Algorithm Sorter Visualizer</h1>
        <div class="controls">
            <button id="generate-btn">Generate Array</button>
            <button id="sort-btn">Sort Array</button>
            <select id="algorithm-select">
                <option value="bubble">Bubble Sort</option>
                <option value="quick">Quick Sort</option>
                <option value="merge">Merge Sort</option>
                <option value="insertion">Insertion Sort</option>
                <option value="selection">Selection Sort</option>
            </select>
            <input type="number" id="array-size" min="5" max="100" value="20" />
            <label for="array-size">Array Size</label>
        </div>
        <div class="visualizer" id="visualizer"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
